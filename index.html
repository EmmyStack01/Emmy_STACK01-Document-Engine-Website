<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emmy STACK01 — Document Engine</title>
  <link rel="apple-touch-icon" sizes="180x180" href="https://emmystack01.com/favicon_io/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="https://emmystack01.com/favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="https://emmystack01.com/favicon_io/favicon-16x16.png">
  <link rel="manifest" href="https://emmystack01.com/favicon_io/site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
  /* ── TOKENS ──────────────────────────────────────────────────────────── */
  :root {
    --doc-bg:        #ffffff;
    --doc-ink:       #0d1117;
    --doc-primary:   #1a4fa8;
    --doc-secondary: #0d2b6e;
    --doc-rule:      #dde3ef;
    --doc-muted:     #64748b;

    --ui-bg:         #0b0d14;
    --ui-surface:    #131621;
    --ui-surface2:   #1a1e2e;
    --ui-border:     #252b40;
    --ui-border2:    #323a56;
    --ui-text:       #e8ecf4;
    --ui-muted:      #7882a0;
    --ui-accent:     #4d9cf8;
    --ui-accent2:    #00e5c3;
    --ui-danger:     #f87171;

    --font-ui:    'Montserrat', sans-serif;
    --font-doc:   'Montserrat', sans-serif;
    --font-brand: 'Orbitron';
    --font-mono:  'Orbitron';
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }

  body {
    font-family: var(--font-ui);
    background: var(--ui-bg);
    color: var(--ui-text);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--ui-border2); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ui-accent); }

  /* ── CONTROL PANEL ───────────────────────────────────────────────────── */
  .control-panel {
    width: 380px;
    min-width: 340px;
    flex-shrink: 0;
    background: var(--ui-surface);
    border-right: 1px solid var(--ui-border);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  .panel-head {
    padding: 1.4rem 1.75rem 1.2rem;
    border-bottom: 1px solid var(--ui-border);
    flex-shrink: 0;
  }

  .brand-lockup { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.2rem; }

  .brand-icon {
    width: 30px; height: 30px;
    background: #4d9df836;
    backdrop-filter: blur(12px);
    --webkit-backdrop-filter: blur(12px);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-brand);
    font-size: 0.68rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    flex-shrink: 0;
  }

  .brand-name {
    font-family: var(--font-brand);
    font-size: 1rem;
    font-weight: 700;
    color: var(--ui-text);
  }
  .brand-name span { color: var(--ui-accent); }

  .brand-sub {
    font-size: 0.68rem;
    color: var(--ui-muted);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    font-family: var(--font-mono);
  }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem 1.75rem;
    display: flex;
    flex-direction: column;
    gap: 1.35rem;
  }

  .section-label {
    font-size: 0.63rem;
    font-family: var(--font-mono);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ui-muted);
    margin-bottom: 0.55rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--ui-border); }

  .form-group { display: flex; flex-direction: column; gap: 0.3rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; }

  label {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.3px;
    color: var(--ui-muted);
    text-transform: uppercase;
  }

  select, input[type="text"], textarea {
    background: var(--ui-surface2);
    border: 1px solid var(--ui-border2);
    padding: 0.58rem 0.72rem;
    color: var(--ui-text);
    border-radius: 6px;
    font-family: var(--font-ui);
    font-size: 0.88rem;
    transition: border-color 0.15s, box-shadow 0.15s;
    line-height: 1.4;
  }
  select:focus, input[type="text"]:focus, textarea:focus {
    border-color: var(--ui-accent);
    box-shadow: 0 0 0 3px rgba(77,156,248,0.12);
    outline: none;
  }
  select { cursor: pointer; }
  select option { background: var(--ui-surface2); }
  textarea { resize: vertical; min-height: 68px; }

  /* Template tabs */
  #templateSelect { display: none; }
  .template-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
  .template-tab {
    padding: 0.6rem 0.4rem;
    background: var(--ui-surface2);
    border: 1px solid var(--ui-border2);
    border-radius: 6px;
    color: var(--ui-muted);
    font-size: 0.76rem;
    font-weight: 600;
    font-family: var(--font-ui);
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    line-height: 1.3;
  }
  .template-tab:hover { border-color: var(--ui-accent); color: var(--ui-text); }
  .template-tab.active {
    background: rgba(77,156,248,0.12);
    border-color: var(--ui-accent);
    color: var(--ui-accent);
  }

  /* Checkbox */
  .checkbox-group {
    display: flex;
    flex-direction: column;
    gap: 0.42rem;
    background: var(--ui-surface2);
    border: 1px solid var(--ui-border);
    border-radius: 6px;
    padding: 0.65rem 0.72rem;
  }
  .check-label {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--ui-text);
    font-size: 0.8rem;
    cursor: pointer;
    line-height: 1.3;
  }
  .check-label input[type="checkbox"] {
    width: 14px; height: 14px;
    accent-color: var(--ui-accent);
    cursor: pointer;
    flex-shrink: 0;
  }

  /* Footer */
  .panel-footer {
    padding: 0.9rem 1.75rem 1.2rem;
    border-top: 1px solid var(--ui-border);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 0.55rem;
  }

  .btn-export {
    background: var(--ui-accent);
    color: var(--ui-bg);
    border: none;
    padding: 0.82rem 1rem;
    border-radius: 8px;
    font-family: var(--font-brand);
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    width: 100%;
  }
  .btn-export:hover { background: #6eaff9; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(77,156,248,0.35); }
  .btn-export:active { transform: translateY(0); }
  .btn-export.loading { opacity: 0.65; pointer-events: none; }

  .export-status {
    font-size: 0.7rem;
    color: var(--ui-muted);
    font-family: var(--font-mono);
    text-align: center;
    min-height: 16px;
  }
  .export-status.ok  { color: var(--ui-accent2); }
  .export-status.err { color: var(--ui-danger); }

  .footer-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer-meta span { font-size: 0.7rem; color: var(--ui-muted); }
  .page-badge {
    font-family: var(--font-mono);
    font-size: 0.66rem;
    color: var(--ui-muted);
    background: var(--ui-surface2);
    border: 1px solid var(--ui-border);
    border-radius: 99px;
    padding: 0.2rem 0.6rem;
  }
  .page-badge b { color: var(--ui-accent); }

  /* ── PREVIEW PANE ────────────────────────────────────────────────────── */
  .preview-container {
    flex: 1;
    height: 100vh;
    overflow-y: auto;
    background: #07080f;
    padding: 2.5rem 2rem;
  }

  .preview-label {
    font-family: var(--font-mono);
    font-size: 0.63rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #2a3050;
    text-align: center;
    margin-bottom: 1.5rem;
  }

  #downloadWrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.75rem;
    width: 100%;
  }

  /* ── PAPER SHEET ─────────────────────────────────────────────────────── */
  .paper-sheet {
    background: var(--doc-bg);
    color: var(--doc-ink);
    width: 210mm;
    height: 297mm;
    padding: 22mm 22mm 20mm 22mm;
    margin: 0 auto;
    box-shadow: 0 8px 48px rgba(0,0,0,0.65), 0 2px 8px rgba(0,0,0,0.4);
    box-sizing: border-box;
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    page-break-inside: avoid !important;
    page-break-after: always !important;
    break-after: page !important;
  }
  .paper-sheet:last-of-type {
    page-break-after: avoid !important;
    break-after: avoid !important;
  }

  /* ── DOCUMENT STYLES ─────────────────────────────────────────────────── */
  .doc-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid var(--doc-primary);
    padding-bottom: 1rem;
    margin-bottom: 1.5rem;
    page-break-inside: avoid !important;
  }

  .doc-logo-emmy {
    font-family: 'Orbitron';
    font-size: 1.25rem;
    font-weight: 800;
    color: var(--doc-secondary);
    letter-spacing: -0.3px;
  }
  .doc-logo-emmy span { color: var(--doc-primary); }

  .doc-client-logo {
    font-family: 'Orbitron';
    font-weight: 700;
    font-size: 0.8rem;
    color: var(--doc-muted);
    max-width: 180px;
    text-align: right;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .doc-title {
    font-family: 'Orbitron';
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--doc-secondary);
    margin-bottom: 1.2rem;
    text-transform: uppercase;
    line-height: 1.15;
    letter-spacing: -0.5px;
    page-break-inside: avoid !important;
  }

  .doc-meta-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 1.8rem;
    page-break-inside: avoid !important;
  }
  .doc-meta-table td {
    padding: 0.4rem 0;
    border-bottom: 1px solid var(--doc-rule);
    font-size: 0.86rem;
    line-height: 1.4;
  }
  .doc-meta-table td:first-child {
    font-weight: 700;
    color: var(--doc-secondary);
    width: 32%;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .doc-meta-table tr:last-child td { border-bottom: none; }

  .doc-body {
    font-size: 0.88rem;
    line-height: 1.62;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    color: var(--doc-ink);
  }

  .doc-body h3 {
    font-family: 'Syne', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--doc-primary);
    margin: 1.2rem 0 0.4rem 0;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    border-bottom: 1px solid var(--doc-rule);
    padding-bottom: 0.18rem;
    page-break-inside: avoid !important;
    break-inside: avoid !important;
    break-after: avoid !important;
  }

  .doc-body p {
    margin-bottom: 0.72rem;
    text-align: justify;
    hyphens: auto;
    page-break-inside: avoid !important;
  }

  .doc-body ul {
    margin-left: 0;
    margin-bottom: 0.72rem;
    list-style: none;
    padding-left: 0;
  }
  .doc-body ul li {
    margin-bottom: 0.28rem;
    page-break-inside: avoid !important;
    display: flex;
    gap: 0.45rem;
    align-items: flex-start;
  }
  .doc-body ul li::before {
    content: '—';
    color: var(--doc-primary);
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 0.02em;
  }

  /* Signature */
  .signature-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    width: 100%;
    margin-top: auto;
    padding-top: 1.2rem;
    page-break-inside: avoid !important;
    break-inside: avoid !important;
  }
  .sig-block-label {
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--doc-secondary);
    margin-bottom: 0.35rem;
    font-family: 'Syne', sans-serif;
  }
  .sig-line {
    border-top: 1.5px solid var(--doc-ink);
    padding-top: 0.4rem;
    margin-top: 2.2rem;
    font-size: 0.8rem;
    line-height: 1.55;
    color: var(--doc-ink);
  }
  .sig-line em {
    display: block;
    font-style: normal;
    color: var(--doc-muted);
    font-size: 0.73rem;
    margin-top: 0.15rem;
  }

  .doc-footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-top: 1.2rem;
    padding-top: 0.85rem;
    border-top: 1px solid var(--doc-rule);
    page-break-inside: avoid !important;
  }
  .doc-footer-note {
    font-size: 0.7rem;
    color: var(--doc-muted);
    max-width: 73%;
    line-height: 1.45;
  }
  .qr-container {
    width: 72px; height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--doc-rule);
    padding: 3px;
    flex-shrink: 0;
  }

  .page-stamp {
    position: absolute;
    bottom: 11mm;
    right: 22mm;
    font-size: 0.62rem;
    color: #c8d0e0;
    letter-spacing: 0.4px;
    font-family: 'DM Mono', monospace;
  }

  /* ── RESPONSIVE ──────────────────────────────────────────────────────── */
  @media screen and (max-width: 900px) {
    body { flex-direction: column; overflow-y: auto; height: auto; }
    .control-panel { width: 100%; min-width: 0; height: auto; border-right: none; border-bottom: 1px solid var(--ui-border); }
    .preview-container { width: 100%; height: auto; overflow: visible; padding: 1rem 0.3rem; }
    #downloadWrapper { transform: scale(0.88); transform-origin: top center; }
    .paper-sheet { box-shadow: none; }
  }

  /* ── PRINT ───────────────────────────────────────────────────────────── */
  @media print {
    @page { size: A4 portrait; margin: 0 !important; }
    html, body { background: #fff !important; width: 210mm !important; height: auto !important; overflow: visible !important; }
    .control-panel { display: none !important; }
    .preview-container { width: 210mm !important; padding: 0 !important; background: none !important; }
    #downloadWrapper { width: 210mm !important; gap: 0 !important; }
    .paper-sheet {
      width: 210mm !important; height: 297mm !important;
      padding: 22mm 22mm 20mm 22mm !important;
      box-shadow: none !important; margin: 0 !important;
      page-break-after: always !important; break-after: page !important;
    }
    .paper-sheet:last-of-type { page-break-after: avoid !important; break-after: avoid !important; }
    .doc-body p  { margin-bottom: 0.58rem !important; line-height: 1.55 !important; }
    .doc-body h3 { margin-top: 1.1rem !important; margin-bottom: 0.32rem !important; }
    .doc-body ul { margin-bottom: 0.58rem !important; }
    .doc-body li { margin-bottom: 0.2rem !important; }
    .page-stamp  { display: none !important; }
  }

  /* ── EXPORT OVERLAY ──────────────────────────────────────────────────── */
  .export-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(7,8,15,0.88);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1rem;
    backdrop-filter: blur(4px);
  }
  .export-overlay.visible { display: flex; }
  .export-spinner {
    width: 38px; height: 38px;
    border: 3px solid var(--ui-border2);
    border-top-color: var(--ui-accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .export-overlay p {
    font-family: var(--font-mono);
    font-size: 0.78rem;
    color: var(--ui-muted);
    letter-spacing: 0.5px;
  }
  </style>
</head>
<body>

<div class="export-overlay" id="exportOverlay">
  <div class="export-spinner"></div>
  <p>Rendering PDF — please wait...</p>
</div>

<!-- ── CONTROL PANEL ─────────────────────────────────────────────── -->
<aside class="control-panel">
  <div class="panel-head">
    <div class="brand-lockup">
      <div class="brand-icon"><img src="https://emmystack01.com/favicon_io/favicon-32x32.png" alt="Emmy STACK01 Favicon"></div>
      <div class="brand-name">Emmy <span>STACK01</span></div>
    </div>
    <div class="brand-sub">Document Engine v2</div>
  </div>

  <div class="panel-body">

    <!-- Template -->
    <div>
      <div class="section-label">Template</div>
      <select id="templateSelect">
        <option value="whiteLabel">Professional White-Label License</option>
        <option value="projectAgreement">Project Agreement</option>
      </select>
      <div class="template-tabs" style="margin-top:0.5rem;">
        <button class="template-tab active" data-val="whiteLabel" onclick="setTemplate('whiteLabel')">White-Label<br>License</button>
        <button class="template-tab" data-val="projectAgreement" onclick="setTemplate('projectAgreement')">Project<br>Agreement</button>
      </div>
    </div>

    <!-- Parties -->
    <div>
      <div class="section-label">Parties &amp; Details</div>
      <div style="display:flex;flex-direction:column;gap:0.65rem;">
        <div class="form-group">
          <label for="inputClient">Client / Company Name</label>
          <input type="text" id="inputClient" value="Acme Corporation">
        </div>
        <div class="form-group">
          <label for="inputProject">Software / Project Name</label>
          <input type="text" id="inputProject" value="Custom E-Commerce Platform &amp; Core Engine">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="inputDate">Effective Date</label>
            <input type="text" id="inputDate" value="May 24, 2026">
          </div>
          <div class="form-group">
            <label for="inputFee">Fee / Cost</label>
            <input type="text" id="inputFee" value="$100 USD">
          </div>
        </div>
      </div>
    </div>

    <!-- QR -->
    <div>
      <div class="section-label">QR Code (Optional)</div>
      <div style="display:flex;flex-direction:column;gap:0.65rem;">
        <div class="form-group">
          <label for="inputQRnote">Footer Note</label>
          <input type="text" id="inputQRnote" value="Scan the QR code to sign this document.">
        </div>
        <div class="form-group">
          <label for="inputQR">Link URL</label>
          <input type="text" id="inputQR" value="https://emmystack01.com/tools/emmy-sign" placeholder="https://...">
        </div>
      </div>
    </div>

    <!-- Agreement controls (shown only for project agreement) -->
    <div id="agreementControls" style="display:none;">
      <div>
        <div class="section-label">Scope of Work</div>
        <div class="checkbox-group">
          <label class="check-label"><input type="checkbox" id="toggleCreative" checked> Creative Assets (Brand Kit / UI/UX)</label>
          <label class="check-label"><input type="checkbox" id="toggleTechnical" checked> Technical Architecture (Code / SEO)</label>
          <label class="check-label"><input type="checkbox" id="toggleDeployment" checked> Deployment Operations (Hosting / Git)</label>
          <label class="check-label"><input type="checkbox" id="toggleSearch" checked> Search Verification (Search Console)</label>
        </div>
      </div>
      <div style="margin-top:0.9rem;">
        <div class="section-label">Optional Clauses</div>
        <div class="checkbox-group">
          <label class="check-label"><input type="checkbox" id="toggleClause2" checked> Clause 2 — Financial &amp; Milestone Terms</label>
          <label class="check-label"><input type="checkbox" id="toggleClause3" checked> Clause 3 — Domain Infrastructure &amp; Costs</label>
          <label class="check-label"><input type="checkbox" id="toggleClause5" checked> Clause 5 — White-Label Option</label>
          <label class="check-label"><input type="checkbox" id="toggleClause6" checked> Clause 6 — Termination &amp; Kill Fee</label>
        </div>
      </div>
    </div>

  </div>

  <div class="panel-footer">
    <div class="footer-meta">
      <span>Live preview</span>
      <div class="page-badge">Pages: <b id="pageCountDisplay">—</b></div>
    </div>
    <button class="btn-export" id="printBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export PDF
    </button>
    <div class="export-status" id="exportStatus"></div>
  </div>
</aside>

<!-- ── PREVIEW PANE ───────────────────────────────────────────────── -->
<main class="preview-container">
  <div class="preview-label">A4 Preview — 210 × 297 mm</div>
  <div id="downloadWrapper"></div>
</main>

<script>
// ═══════════════════════════════════════════════════════
// 1. DOM REFS
// ═══════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const el = {
  templateSelect:  $('templateSelect'),
  inputClient:     $('inputClient'),
  inputProject:    $('inputProject'),
  inputDate:       $('inputDate'),
  inputFee:        $('inputFee'),
  inputQR:         $('inputQR'),
  inputQRnote:     $('inputQRnote'),
  downloadWrapper: $('downloadWrapper'),
  printBtn:        $('printBtn'),
  exportStatus:    $('exportStatus'),
  exportOverlay:   $('exportOverlay'),
  pageCount:       $('pageCountDisplay')
};

function setTemplate(val) {
  el.templateSelect.value = val;
  document.querySelectorAll('.template-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.val === val)
  );
  renderDocument();
}

// ═══════════════════════════════════════════════════════
// 2. TEMPLATES
// ═══════════════════════════════════════════════════════
const templates = {
  whiteLabel: {
    title: "Professional White-Label License",
    getContent: () => `
      <h3>1. Grant of License &amp; IP Transfer</h3>
      <p>Subject to full payment of the License Fee, the Developer grants the Licensee a perpetual, worldwide, irrevocable, and exclusive <strong>Professional Brand License</strong>.</p>
      <p><strong>Intellectual Property (IP) Transfer:</strong> Full technical and legal ownership of the software's source code is transferred to the Licensee. The Developer waives all future claims to the code's IP, transforming the software from a managed service into a proprietary company asset.</p>
      <p><strong>Unlimited Modification:</strong> The Licensee holds unrestricted rights to fork, alter, edit, copy, or resell the code as part of their business assets.</p>
      <h3>2. White-Label &amp; Sovereignty Rights</h3>
      <p>This license establishes total digital sovereignty for the Licensee through a formal <strong>Handover Protocol</strong>:</p>
      <ul>
        <li><strong>Zero-Attribution Interface:</strong> The Licensee is granted the specific right to completely remove the "Built by Emmy STACK01" signature, metadata, and developer credits from the website footer and documentation to present a 100% proprietary brand experience.</li>
        <li><strong>Infrastructure Sovereignty:</strong> Administrative control of the project repository (GitHub/ZIP containing Astro, HTML5, or GSAP files), hosting environments (Vercel/Netlify), domain DNS credentials, and integrated third-party APIs (e.g., Paystack, Google Search Console) shall be fully transferred to the Licensee's accounts.</li>
      </ul>
      <h3>3. Master Release Package Delivery</h3>
      <p>Upon execution, the Developer will deliver the <strong>Master Release Package</strong>, which includes:</p>
      <ul>
        <li><strong>The Digital DNA:</strong> Clean, zero-attribution source code and the original UI/UX Asset Vault.</li>
        <li><strong>IP Certificate:</strong> A formal PDF document confirming full title deed and ownership transfer.</li>
        <li><strong>System Documentation:</strong> The structural blueprint, modification guide, and deployment manual for independent scaling.</li>
      </ul>
      <h3>4. No Warranty &amp; Limitation of Liability</h3>
      <p>The software is provided <strong>"as is"</strong> without warranty of any kind, express or implied. Following the successful transfer of the code repository and administrative credentials, the Developer is entirely released from any ongoing maintenance, hosting liabilities, or claims arising from the Licensee's independent modifications and deployment.</p>
    `
  },
  projectAgreement: {
    title: "Project Development Agreement",
    getContent: (flags) => {
      let n = 1, html = '';

      let items = '';
      if (flags.creative)   items += `<li><strong>Creative Assets:</strong> Custom Brand Identity kit (Color Palette, Typography, Favicon set, Open Graph tags) and complete UI/UX Website Design mock-ups.</li>`;
      if (flags.technical)  items += `<li><strong>Technical Architecture:</strong> Custom-coded core development (HTML5/CSS3/ES6+ JavaScript or Astro ecosystem) featuring fluid GSAP animations, technical On-Page SEO optimization, and standard indexing assets (robots.txt, sitemap.xml).</li>`;
      if (flags.deployment) items += `<li><strong>Deployment Operations:</strong> Production hosting setup via Git-backed infrastructure (GitHub repository / Vercel orchestration) and custom domain routing configuration.</li>`;
      if (flags.search)     items += `<li><strong>Search Verification:</strong> Official site registration and indexing submission via Google Search Console.</li>`;

      html += `

        <p><strong>Client Responsibility:</strong> The Client retains sole financial responsibility for purchasing their target domain asset from a DNS registrar (e.g., Namecheap.com) and sustaining its ongoing annual subscription renewals.</p>
      `; }

      html += `
        <h3>${++n}. Code Ownership &amp; Future Upgrades</h3>
        <p><strong>Default Operational Transfer:</strong> Upon successful clearance of Milestone 2, the Client is granted full operational access to the website properties. By default, the underlying source code ecosystem, core "Digital DNA" engineering files, and structural maintenance framework remain managed within the Emmy STACK01 development network.</p>

        <p><strong>White Label Brand License Option:</strong> The Client can completely detach their project from the Emmy STACK01 infrastructure by purchasing a White Label Brand License for a flat fee of $100. Acquiring the License grants the Client: 100% full Intellectual Property (IP) and source code ownership, complete removal of all developer attribution tags, and total freedom to host, fork, modify, or redistribute the software on independent servers or private infrastructure.</p>

      if (flags.clause6) { html += `
        <h3>${++n}. Termination &amp; Kill Fee Clauses</h3>
        <p>If the Client chooses to terminate this project after design blueprints are finalized and Milestone 1 has been settled, Emmy STACK01 will halt all further code production. Emmy STACK01 retains the initial 35% milestone balance as a non-refundable "Kill Fee" to directly cover the specialized design labor already performed.</p>
      `; }

      return html;
    }

};

// ═══════════════════════════════════════════════════════
// 3. LAYOUT SPLITTER ENGINE
// A4 at 96dpi = 1122.5px tall. Padding top(22mm)+bottom(20mm) = 42mm ≈ 158.7px.
// Usable area ≈ 963px. We use 930px as a safe ceiling.
// ═══════════════════════════════════════════════════════
const MAX_PX = 930;

function renderDocument() {
  const mode = el.templateSelect.value;
  const tmpl = templates[mode];
  if (!tmpl) return;

  $('agreementControls').style.display = mode === 'projectAgreement' ? 'block' : 'none';

  const flags = {
    creative:   $('toggleCreative')?.checked  || false,
    technical:  $('toggleTechnical')?.checked || false,
    deployment: $('toggleDeployment')?.checked|| false,
    search:     $('toggleSearch')?.checked    || false,
    clause2:    $('toggleClause2')?.checked   || false,
    clause3:    $('toggleClause3')?.checked   || false,
    clause5:    $('toggleClause5')?.checked   || false,
    clause6:    $('toggleClause6')?.checked   || false,
  };

  const clientVal  = el.inputClient.value.trim()  || "[Client Name]";
  const projectVal = el.inputProject.value.trim() || "[Project Name]";
  const dateVal    = el.inputDate.value.trim()    || "[Effective Date]";
  const feeVal     = el.inputFee.value.trim()     || "[Fee Amount]";
  const qrnoteVal  = el.inputQRnote.value.trim()  || "";
  const qrUrl      = el.inputQR.value.trim();

  const clientLabel = mode === 'projectAgreement' ? "Client:" : "Licensee:";
  const feeLabel    = mode === 'projectAgreement' ? "Project Fee:" : "License Fee:";
  const showFee     = mode === 'whiteLabel' || flags.clause2;

  // Off-screen sandbox for height measurement
  const sandbox = document.createElement('div');
  Object.assign(sandbox.style, {
    position:   'absolute',
    left:       '-9999px',
    top:        '0',
    width:      '210mm',
    padding:    '22mm 22mm 20mm 22mm',
    background: '#fff',
    fontFamily: "'DM Sans', sans-serif",
    fontSize:   '14.08px',   // 0.88rem at 16px base
    lineHeight: '1.62',
    color:      '#0d1117',
    boxSizing:  'border-box',
    overflow:   'visible',
    visibility: 'hidden',
  });
  document.body.appendChild(sandbox);

  const measure = (html) => { sandbox.innerHTML = html; return sandbox.scrollHeight; };

  // Parse content blocks
  const blocks = Array.from(
    new DOMParser()
      .parseFromString(`<div>${tmpl.getContent(flags)}</div>`, 'text/html')
      .querySelector('div').children
  );

  const subHeader = () => `
    <header class="doc-header" style="margin-bottom:1.1rem;padding-bottom:0.75rem;">
      <div class="doc-logo-emmy" style="font-size:1.05rem;">Emmy <span>STACK01</span></div>
      <div class="doc-client-logo" style="font-size:0.72rem;">${clientVal.toUpperCase()}</div>
    </header>
    <div class="doc-body">
  `;

  let cur = `
    <header class="doc-header">
      <div class="doc-logo-emmy">Emmy <span>STACK01</span></div>
      <div class="doc-client-logo">${clientVal.toUpperCase()}</div>
    </header>
    <h1 class="doc-title">${tmpl.title}</h1>
    <table class="doc-meta-table">
      <tr><td>Software:</td><td>${projectVal}</td></tr>
      <tr><td>Developer:</td><td>Emmy STACK01</td></tr>
      <tr><td>${clientLabel}</td><td>${clientVal}</td></tr>
      <tr><td>Effective Date:</td><td>${dateVal}</td></tr>
      ${showFee ? `<tr><td>${feeLabel}</td><td>${feeVal}</td></tr>` : ''}
    </table>
    <div class="doc-body">
  `;

  const pages = [];

  blocks.forEach(node => {
    const tag = node.tagName?.toLowerCase();
    if (tag === 'ul') {
      const lis = Array.from(node.querySelectorAll('li'));
      cur += '<ul>';
      lis.forEach(li => {
        if (measure(cur + li.outerHTML + '</ul></div>') > MAX_PX) {
          cur += '</ul></div>';
          pages.push(cur);
          cur = subHeader() + '<ul>' + li.outerHTML;
        } else {
          cur += li.outerHTML;
        }
      });
      cur += '</ul>';
    } else {
      if (measure(cur + node.outerHTML + '</div>') > MAX_PX) {
        cur += '</div>';
        pages.push(cur);
        cur = subHeader() + node.outerHTML;
      } else {
        cur += node.outerHTML;
      }
    }
  });
  cur += '</div>';
  pages.push(cur);

  // Signature + footer
  const qrKey = 'qr_' + Math.random().toString(36).substr(2, 9);
  const sigHTML = `
    <div class="signature-grid">
      <div>
        <div class="sig-block-label">Developer</div>
        <div class="sig-line">
          Emmy STACK01 — Authorized Representative
          <em>Date: ________________________________</em>
        </div>
      </div>
      <div>
        <div class="sig-block-label">Recipient</div>
        <div class="sig-line">
          ${clientVal} — Authorized Representative
          <em>Date: ________________________________</em>
        </div>
      </div>
    </div>
    <footer class="doc-footer">
      <div class="doc-footer-note">${qrnoteVal}</div>
      <div id="${qrKey}" class="qr-container" style="${qrUrl ? '' : 'display:none;'}"></div>
    </footer>
  `;

  const lastIdx = pages.length - 1;
  if (measure(pages[lastIdx] + sigHTML) > MAX_PX) {
    pages.push(`
      <header class="doc-header" style="margin-bottom:1.1rem;padding-bottom:0.75rem;">
        <div class="doc-logo-emmy" style="font-size:1.05rem;">Emmy <span>STACK01</span></div>
        <div class="doc-client-logo" style="font-size:0.72rem;">${clientVal.toUpperCase()}</div>
      </header>
      <div class="doc-body" style="flex-grow:1;"></div>
      ${sigHTML}
    `);
  } else {
    pages[lastIdx] += sigHTML;
  }

  document.body.removeChild(sandbox);

  // Build DOM
  const frag = document.createDocumentFragment();
  const total = pages.length;
  pages.forEach((html, i) => {
    const sheet = document.createElement('article');
    sheet.className = 'paper-sheet';
    sheet.innerHTML = html;
    const stamp = document.createElement('div');
    stamp.className = 'page-stamp';
    stamp.textContent = `${i + 1} / ${total}`;
    sheet.appendChild(stamp);
    frag.appendChild(sheet);
  });
  el.downloadWrapper.innerHTML = '';
  el.downloadWrapper.appendChild(frag);
  el.pageCount.textContent = total;

  // QR
  if (qrUrl) {
    const target = document.getElementById(qrKey);
    if (target) {
      new QRCode(target, {
        text: qrUrl, width: 66, height: 66,
        colorDark: '#0d2b6e', colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
      });
    }
  }
}

// ═══════════════════════════════════════════════════════
// 4. EVENTS
// ═══════════════════════════════════════════════════════
[el.inputClient, el.inputProject, el.inputDate, el.inputFee, el.inputQR, el.inputQRnote]
  .forEach(e => e?.addEventListener('input', renderDocument));

['toggleCreative','toggleTechnical','toggleDeployment','toggleSearch',
 'toggleClause2','toggleClause3','toggleClause5','toggleClause6']
  .forEach(id => $(id)?.addEventListener('change', renderDocument));

// ═══════════════════════════════════════════════════════
// 5. PDF EXPORT
// ═══════════════════════════════════════════════════════
el.printBtn.addEventListener('click', async () => {
  const mode   = el.templateSelect.value;
  const client = el.inputClient.value.trim() || "Client";
  const name   = mode === 'whiteLabel'
    ? `White_Label_License_${client.replace(/\s+/g,'_')}.pdf`
    : `Project_Agreement_${client.replace(/\s+/g,'_')}.pdf`;

  el.exportOverlay.classList.add('visible');
  el.printBtn.classList.add('loading');
  el.exportStatus.textContent = '';
  el.exportStatus.className = 'export-status';

  await new Promise(r => setTimeout(r, 100));

  try {
    await html2pdf().set({
      margin: 0,
      filename: name,
      image:       { type: 'jpeg', quality: 0.99 },
      html2canvas: {
        scale: 2,
        useCORS: true,
        logging: false,
        letterRendering: true,
        scrollX: 0,
        scrollY: 0,
        windowWidth: 794,
        backgroundColor: '#ffffff',
        onclone: (doc) => {
          // Force each sheet to exact A4 dimensions in PDF clone
          doc.querySelectorAll('.paper-sheet').forEach(s => {
            s.style.width        = '210mm';
            s.style.height       = '297mm';
            s.style.minHeight    = '297mm';
            s.style.maxHeight    = '297mm';
            s.style.overflow     = 'hidden';
            s.style.pageBreakAfter = 'always';
            s.style.breakAfter    = 'page';
            s.style.boxShadow    = 'none';
            s.style.margin       = '0';
          });
          // Remove screen-only elements
          doc.querySelectorAll('.page-stamp').forEach(s => s.remove());
          doc.querySelectorAll('.export-overlay').forEach(s => s.remove());
        }
      },
      jsPDF:     { unit: 'mm', format: 'a4', orientation: 'portrait', compress: true },
      pagebreak: { mode: ['css', 'legacy'] }
    }).from(el.downloadWrapper).save();

    el.exportStatus.textContent = '✓ PDF exported successfully';
    el.exportStatus.className = 'export-status ok';
  } catch (err) {
    console.error(err);
    el.exportStatus.textContent = '✗ Export failed — see console';
    el.exportStatus.className = 'export-status err';
  } finally {
    el.exportOverlay.classList.remove('visible');
    el.printBtn.classList.remove('loading');
    setTimeout(() => {
      el.exportStatus.textContent = '';
      el.exportStatus.className = 'export-status';
    }, 4000);
  }
});

// ═══════════════════════════════════════════════════════
// 6. INIT
// ═══════════════════════════════════════════════════════
renderDocument();
</script>
</body>
</html>
